name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test_prettier:
    name: Test Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install Dependencies
        run: npm install
      - name: Run the prettier tests
        run: npm run prettier
  test_types:
    name: Test Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install Dependencies
        run: npm install
      - name: Run the type tests
        run: npm run test:type
  test_unit:
    name: Test Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install Dependencies
        run: npm install
      - name: Run the tests
        run: npm run test:unit
